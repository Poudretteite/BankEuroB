spring:
  application:
    name: bankeurob-backend

  # ─── Baza danych ───────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/bankeurob}
    username: ${SPRING_DATASOURCE_USERNAME:bankeurob_user}
    password: "${SPRING_DATASOURCE_PASSWORD:BankEuroB_Secret2026!}"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ─── JPA / Hibernate ───────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway zarządza schematem, Hibernate tylko waliduje
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # ─── Flyway – migracje bazy danych ─────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ─── RabbitMQ ──────────────────────────────────────────────────
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: guest
    password: guest
    virtual-host: /

# ─── Server ────────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: always
    include-binding-errors: always

# ─── JWT ───────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:BankEuroBJwtSuperSecretKey2026MustBe256BitsLong!!}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24h

# ─── Logging ───────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.bankeurob: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: INFO

# ─── CORS (dla frontendu React) ────────────────────────────────────
app:
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:5173"

  # Dane identyfikacyjne banku
  bank:
    name: "BankEuroB"
    bic: "BKEUDEBBXXX"
    iban-country-prefix: "DE"
    swift-code: "BKEUDEBBXXX"
